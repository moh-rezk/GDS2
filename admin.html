<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Al-Mosafer Admin — GitHub Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2234;
  --border:rgba(255,255,255,0.07);--border-s:rgba(255,255,255,0.12);
  --em:#10b981;--em-d:#059669;--em-x:rgba(16,185,129,0.1);--em-b:rgba(16,185,129,0.25);
  --sky:#38bdf8;--amber:#fbbf24;--red:#f87171;--purple:#a78bfa;
  --text:#f1f5f9;--muted:#94a3b8;--faint:#475569;
  --r:12px;--r-s:8px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Arabic',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:30px;height:30px;background:var(--em);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.nav-title{font-size:14px;font-weight:700;letter-spacing:-.02em;}
.nav-title span{color:var(--em);}
.nav-right{display:flex;align-items:center;gap:8px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block;margin-left:5px;}
.status-dot.ok{background:var(--em);}
.status-dot.err{background:var(--red);}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;letter-spacing:.04em;text-transform:uppercase;}
.badge-amber{background:rgba(251,191,36,.12);color:var(--amber);border-color:rgba(251,191,36,.3);}
.badge-green{background:var(--em-x);color:var(--em);border-color:var(--em-b);}
.badge-red{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3);}

/* LAYOUT */
.shell{display:grid;grid-template-columns:210px 1fr;flex:1;min-height:0;}
.sidebar{background:var(--bg2);border-left:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.sb-sec{font-size:9px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 5px;margin-top:6px;}
.sb-sec:first-child{margin-top:0;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:.15s;border:none;background:none;width:100%;text-align:right;}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--text);}
.sb-item.active{background:var(--em-x);color:var(--em);border:1px solid var(--em-b);}
.sb-cnt{margin-right:auto;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px;font-size:10px;font-family:var(--mono);font-weight:600;}
.sb-item.active .sb-cnt{background:var(--em-b);color:var(--em);}

.main{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}


/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:.15s;border:none;white-space:nowrap;}
.btn-primary{background:var(--em);color:#fff;}
.btn-primary:hover{background:var(--em-d);}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border-s);}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text);}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.btn-danger:hover{background:rgba(248,113,113,.2);}
.btn-amber{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}
.btn-amber:hover{background:rgba(251,191,36,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:6px;}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.ph-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px;}
.ph-sub{font-size:11px;color:var(--muted);}
.ph-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* FILTER BAR */
.fbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px;pointer-events:none;}
.search-inp{width:100%;padding:8px 30px 8px 11px;background:var(--bg3);border:1px solid var(--border-s);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:.15s;}
.search-inp:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-x);}
.search-inp::placeholder{color:var(--faint);}
.filter-sel{padding:8px 11px;background:var(--bg3);border:1px solid var(--border-s);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer;}
.filter-sel:focus{border-color:var(--em);}

/* TABLE */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);padding:9px 13px;text-align:right;font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:9px 13px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.code-b{font-family:var(--mono);font-size:11px;font-weight:700;background:var(--bg3);border:1px solid var(--border-s);padding:2px 7px;border-radius:5px;color:var(--em);letter-spacing:.04em;}
.type-b{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;}
.type-full{background:rgba(56,189,248,.12);color:var(--sky);border:1px solid rgba(56,189,248,.2);}
.type-lcc{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2);}
.type-sa{background:var(--em-x);color:var(--em);border:1px solid var(--em-b);}
.act-btns{display:flex;gap:4px;}
.tfooter{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);flex-wrap:wrap;gap:7px;}
.pagination{display:flex;gap:3px;}
.page-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border-s);background:var(--bg3);color:var(--muted);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.page-btn:hover{border-color:var(--em);color:var(--em);}
.page-btn.active{background:var(--em);color:#fff;border-color:var(--em);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.stat-val{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:11px;color:var(--muted);}
.stat-card.g .stat-val{color:var(--em);}
.stat-card.b .stat-val{color:var(--sky);}
.stat-card.a .stat-val{color:var(--amber);}
.stat-card.p .stat-val{color:var(--purple);}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border-s);border-radius:15px;width:500px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:mi .2s ease;}
@keyframes mi{from{opacity:0;transform:scale(.95) translateY(6px)}to{opacity:1;transform:none}}
.modal-hdr{padding:16px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-shrink:0;}
.modal-title{font-size:14px;font-weight:700;}
.modal-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.modal-close{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:none;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
.modal-close:hover{background:rgba(248,113,113,.15);color:var(--red);}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px;}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0;}

/* FORM */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.fi,.fs{padding:8px 11px;background:var(--bg3);border:1px solid var(--border-s);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:.15s;width:100%;}
.fi:focus,.fs:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-x);}
.fi::placeholder{color:var(--faint);}
.fi.mono{font-family:var(--mono);font-weight:600;letter-spacing:.05em;text-transform:uppercase;}

/* SAVE INDICATOR */
.save-bar{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border-s);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4);}
.save-bar.show{opacity:1;}
.save-bar.ok{border-color:var(--em-b);color:var(--em);}
.save-bar.err{border-color:rgba(248,113,113,.3);color:var(--red);}
.save-bar.loading{border-color:var(--border-s);color:var(--amber);}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOSHOW RULE */
.ns-rule{font-family:var(--mono);font-size:11px;color:var(--amber);max-width:220px;white-space:normal;line-height:1.4;}

/* EMPTY */
.empty{text-align:center;padding:40px 16px;color:var(--faint);}
.empty-icon{font-size:2.2rem;margin-bottom:8px;}
.empty-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px;}

/* SAUDI chips */
.sa-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border-s);border-radius:9px;padding:6px 11px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:3px;}

@media(max-width:768px){.shell{grid-template-columns:1fr;}.sidebar{display:none;}.stats{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">✈️</div>
    <div>
      <div class="nav-title">Al-Mosafer <span>Admin</span></div>
    </div>
  </div>
  <div class="nav-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="badge badge-amber" id="statusBadge">غير متصل</span>
    <span style="font-size:10px;color:var(--faint);font-family:var(--mono);" id="dataVer">v—</span>
  </div>
</nav>

<!-- SHELL -->
<div class="shell">
  <aside class="sidebar">
    <div class="sb-sec">البيانات</div>
    <button class="sb-item active" onclick="showTab('overview')" id="sb-overview">📊 نظرة عامة</button>
    <button class="sb-item" onclick="showTab('airports')" id="sb-airports">🏛️ المطارات <span class="sb-cnt" id="cnt-ap">—</span></button>
    <button class="sb-item" onclick="showTab('airlines')" id="sb-airlines">✈️ شركات الطيران <span class="sb-cnt" id="cnt-al">—</span></button>
    <button class="sb-item" onclick="showTab('noshow')" id="sb-noshow">⏰ نو شو <span class="sb-cnt" id="cnt-ns">—</span></button>
    <button class="sb-item" onclick="showTab('saudi')" id="sb-saudi">🇸🇦 المطارات السعودية <span class="sb-cnt" id="cnt-sa">—</span></button>
    <div class="sb-sec">الإعدادات</div>
    <button class="sb-item" onclick="showTab('setup')" id="sb-setup">⚙️ إعدادات GitHub</button>
  </aside>
  <main class="main" id="mainArea"></main>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div><div class="modal-title" id="mTitle">—</div><div class="modal-sub" id="mSub">—</div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="saveModal()">💾 حفظ</button>
    </div>
  </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar" id="saveBar">
  <div class="spinner" id="saveSpinner"></div>
  <span id="saveMsg">جاري الحفظ...</span>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG — loaded from localStorage
// ══════════════════════════════════════════════
// ── الإعدادات الثابتة للريبو ──────────────────
const REPO_OWNER  = 'moh-rezk';
const REPO_NAME   = 'GDS2';
const REPO_PATH   = 'flight_data.json';
const REPO_BRANCH = 'main';
// ─────────────────────────────────────────────

let CFG = JSON.parse(localStorage.getItem('almosafer_cfg') || '{}');
// CFG: { token } فقط — باقي الإعدادات ثابتة أعلاه

let DB = null;
let fileSHA = null; // needed for GitHub API PUT
let _modalMode = null;
let _modalKey  = null;
let _currentTab = 'overview';

const PAGE_SIZE = 20;
let _apPage = 1, _alPage = 1, _nsPage = 1;
let _apQ = '', _apF = '', _alQ = '', _alF = '', _nsQ = '';

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (isCfgOk()) {
    loadFromGitHub();
  } else {
    showTab('setup');
  }
});

function isCfgOk() {
  return !!CFG.token;
}

function saveCfg() {
  localStorage.setItem('almosafer_cfg', JSON.stringify({ token: CFG.token }));
}

// ══════════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════════
function ghHeaders() {
  return {
    'Authorization': `Bearer ${CFG.token}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    'Content-Type': 'application/json'
  };
}

async function loadFromGitHub() {
  showSaveBar('loading', 'جاري تحميل البيانات من GitHub...');
  try {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${REPO_PATH}?ref=${REPO_BRANCH}`;
    const res = await fetch(url, { headers: ghHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const json = await res.json();
    fileSHA = json.sha;
    const decoded = atob(json.content.replace(/\n/g, ''));
    DB = JSON.parse(decoded);
    updateStatusUI(true);
    refreshCounts();
    showTab('overview');
    hideSaveBar();
  } catch (err) {
    console.error(err);
    updateStatusUI(false);
    showSaveBar('err', '❌ فشل التحميل: ' + err.message);
    setTimeout(hideSaveBar, 4000);
    if (!DB) showTab('setup');
  }
}

async function pushToGitHub() {
  if (!isCfgOk()) { showSaveBar('err', '❌ أدخل GitHub Token أولاً'); setTimeout(hideSaveBar,3000); return; }
  showSaveBar('loading', 'جاري الحفظ في GitHub...');
  try {
    DB.lastUpdated = new Date().toISOString().slice(0, 10);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DB, null, 2))));
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${REPO_PATH}`;
    const body = {
      message: `Admin: update flight_data.json [${new Date().toISOString().slice(0,16)}]`,
      content,
      sha: fileSHA,
      branch: REPO_BRANCH
    };
    const res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data = await res.json();
    fileSHA = data.content.sha;
    document.getElementById('dataVer').textContent = 'v' + (DB.version || '—');
    showSaveBar('ok', '✅ تم الحفظ في GitHub بنجاح!');
    setTimeout(hideSaveBar, 3000);
  } catch (err) {
    console.error(err);
    showSaveBar('err', '❌ فشل الحفظ: ' + err.message);
    setTimeout(hideSaveBar, 5000);
  }
}

function updateStatusUI(ok) {
  const dot = document.getElementById('statusDot');
  const badge = document.getElementById('statusBadge');
  dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
  badge.className = 'badge ' + (ok ? 'badge-green' : 'badge-red');
  badge.textContent = ok ? 'متصل بـ GitHub ✓' : 'غير متصل';
  if (DB) document.getElementById('dataVer').textContent = 'v' + (DB.version || '—');
}

function refreshCounts() {
  if (!DB) return;
  document.getElementById('cnt-ap').textContent = Object.keys(DB.airports || {}).length;
  document.getElementById('cnt-al').textContent = Object.keys(DB.airlines || {}).length;
  document.getElementById('cnt-ns').textContent = Object.keys(DB.noShowRules || {}).length;
  document.getElementById('cnt-sa').textContent = (DB.saudiAirports || []).length;
}

// ══════════════════════════════════════════════
// SAVE BAR
// ══════════════════════════════════════════════
function showSaveBar(type, msg) {
  const bar = document.getElementById('saveBar');
  const spinner = document.getElementById('saveSpinner');
  document.getElementById('saveMsg').textContent = msg;
  bar.className = 'save-bar show ' + type;
  spinner.style.display = type === 'loading' ? 'block' : 'none';
}
function hideSaveBar() {
  document.getElementById('saveBar').className = 'save-bar';
}

// ══════════════════════════════════════════════
// TAB ROUTER
// ══════════════════════════════════════════════
function showTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('sb-' + tab);
  if (el) el.classList.add('active');
  const main = document.getElementById('mainArea');
  if      (tab === 'overview') main.innerHTML = renderOverview();
  else if (tab === 'airports') { main.innerHTML = renderAirports(); bindSearch('apSearch','apFilter','airports'); }
  else if (tab === 'airlines') { main.innerHTML = renderAirlines(); bindSearch('alSearch','alFilter','airlines'); }
  else if (tab === 'noshow')   { main.innerHTML = renderNoShow(); bindSearch('nsSearch',null,'noshow'); }
  else if (tab === 'saudi')    main.innerHTML = renderSaudi();
  else if (tab === 'setup')    main.innerHTML = renderSetup();
}

function bindSearch(sId, fId, tab) {
  const s = document.getElementById(sId);
  const f = fId ? document.getElementById(fId) : null;
  function refresh() {
    if (tab==='airports'){_apQ=s.value;_apPage=1;document.getElementById('mainArea').innerHTML=renderAirports();bindSearch(sId,fId,tab);}
    if (tab==='airlines'){_alQ=s.value;_alPage=1;document.getElementById('mainArea').innerHTML=renderAirlines();bindSearch(sId,fId,tab);}
    if (tab==='noshow')  {_nsQ=s.value;_nsPage=1;document.getElementById('mainArea').innerHTML=renderNoShow();bindSearch(sId,null,tab);}
  }
  if (s) s.addEventListener('input', refresh);
  if (f) f.addEventListener('change', () => {
    if (tab==='airports'){_apF=f.value;_apPage=1;document.getElementById('mainArea').innerHTML=renderAirports();bindSearch(sId,fId,tab);}
    if (tab==='airlines'){_alF=f.value;_alPage=1;document.getElementById('mainArea').innerHTML=renderAirlines();bindSearch(sId,fId,tab);}
  });
}

// ══════════════════════════════════════════════
// SETUP TAB
// ══════════════════════════════════════════════
function renderSetup() {
  const connected = isCfgOk();
  return `
  <div class="ph"><div>
    <div class="ph-title">⚙️ إعدادات الاتصال</div>
    <div class="ph-sub">أدخل GitHub Token للاتصال بالريبو مباشرةً</div>
  </div></div>

  <div class="tcard" style="padding:22px;max-width:500px;">

    </div>

      GitHub → Settings → Developer settings → Personal access tokens → <strong>Tokens (classic)</strong><br>

    </div>

      <span style="font-size:10px;color:var(--faint);margin-top:3px;">يُحفظ في المتصفح محلياً فقط — لا يُرسل لأي خادم خارجي</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveSetup()">💾 حفظ والاتصال</button>
      <button class="btn btn-ghost" onclick="testConnection()">🔗 اختبار الاتصال</button>
      ${connected ? `<button class="btn btn-danger" onclick="clearToken()">🗑 حذف التوكن</button>` : ''}
    </div>
    <div id="setupStatus" style="margin-top:12px;font-size:12px;line-height:1.6;"></div>
  </div>`;
}

function saveSetup() {
  CFG.token = document.getElementById('cfg_token').value.trim();
  if (!CFG.token) {
    document.getElementById('setupStatus').innerHTML = '<span style="color:var(--red);">❌ أدخل GitHub Token أولاً</span>';
    return;
  }
  saveCfg();
  loadFromGitHub();
}

function clearToken() {
  if (!confirm('هل تريد حذف التوكن المحفوظ؟')) return;
  CFG.token = '';
  saveCfg();
  DB = null;
  fileSHA = null;
  updateStatusUI(false);
  showTab('setup');
}

async function testConnection() {
  const token = document.getElementById('cfg_token').value.trim();
  const st = document.getElementById('setupStatus');
  if (!token) { st.innerHTML = '<span style="color:var(--red);">❌ أدخل التوكن أولاً</span>'; return; }
  st.innerHTML = '<span style="color:var(--amber);">⏳ جاري الاختبار...</span>';
  try {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${REPO_PATH}?ref=${REPO_BRANCH}`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (res.ok) {
      const data = await res.json();
      st.innerHTML = `<span style="color:var(--em);">✅ الاتصال ناجح! الملف موجود — SHA: <code style="font-family:var(--mono);">${data.sha.slice(0,8)}</code></span>`;
    } else {
      const err = await res.json();
      st.innerHTML = `<span style="color:var(--red);">❌ خطأ ${res.status}: ${err.message}</span>`;
    }
  } catch (e) {
    st.innerHTML = `<span style="color:var(--red);">❌ ${e.message}</span>`;
  }
}

// PAGER
// ══════════════════════════════════════════════
function pager(pages, current, fn) {
  if (pages<=1) return '';
  let b='';
  const s=i=>`<button class="page-btn ${i===current?'active':''}" onclick="${fn}(${i})">${i}</button>`;
  if (pages<=7){for(let i=1;i<=pages;i++)b+=s(i);}
  else{b+=s(1);if(current>3)b+='<span style="color:var(--faint);padding:0 3px;">…</span>';for(let i=Math.max(2,current-1);i<=Math.min(pages-1,current+1);i++)b+=s(i);if(current<pages-2)b+='<span style="color:var(--faint);padding:0 3px;">…</span>';b+=s(pages);}
  return b;
}

// MODALS — NO-SHOW
// ══════════════════════════════════════════════
function openAddNoShow(){_modalMode='add-noshow';_modalKey=null;openModal('➕ إضافة قاعدة نو شو','أدخل الكود والقاعدة',noshowForm('',''));}
function openEditNoShow(code){_modalMode='edit-noshow';_modalKey=code;const rule=DB.noShowRules[code]||'';openModal(`✏️ تعديل نو شو — ${code}`,DB.airlines?.[code]?.en||'',noshowForm(code,rule));}

<div class="frow">

</div>`;}

// ══════════════════════════════════════════════
// MODALS — SAUDI
// ══════════════════════════════════════════════
function openAddSaudi(){_modalMode='add-saudi';_modalKey=null;openModal('➕ إضافة مطار سعودي','أدخل كود IATA',`<div class="fg"><label class="fl">كود IATA *</label><input id="f_code" class="fi mono" placeholder="RUH" maxlength="3"></div>`);}

// ══════════════════════════════════════════════
// MODAL HELPER
// ══════════════════════════════════════════════
function openModal(title,sub,body){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mSub').textContent=sub;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');_modalMode=null;_modalKey=null;}

// ══════════════════════════════════════════════
// SAVE MODAL → GitHub
// ══════════════════════════════════════════════
async function saveModal(){
  if(_modalMode==='add-airport'||_modalMode==='edit-airport'){
    const code=(document.getElementById('f_code').value||'').trim().toUpperCase();
    const ar=document.getElementById('f_ar').value.trim();
    const en=document.getElementById('f_en').value.trim();
    const country=(document.getElementById('f_country').value||'').trim().toUpperCase();
    const city_ar=document.getElementById('f_city_ar').value.trim();
    const city_en=document.getElementById('f_city_en').value.trim();
    if(!code||!ar||!en){alert('الكود والاسمان مطلوبان');return;}
    DB.airports[code]={ar,en,city_ar:city_ar||ar,city_en:city_en||en,country};
    refreshCounts();closeModal();showTab('airports');
    await pushToGitHub();

  }else if(_modalMode==='add-airline'||_modalMode==='edit-airline'){
    const code=(document.getElementById('f_code').value||'').trim().toUpperCase();
    const ar=document.getElementById('f_ar').value.trim();
    const en=document.getElementById('f_en').value.trim();
    const country=(document.getElementById('f_country').value||'').trim().toUpperCase();
    const type=document.getElementById('f_type').value;
    if(!code||!ar||!en){alert('الكود والاسمان مطلوبان');return;}
    DB.airlines[code]={ar,en,country,type};
    refreshCounts();closeModal();showTab('airlines');
    await pushToGitHub();

  }else if(_modalMode==='add-noshow'||_modalMode==='edit-noshow'){
    const code=(document.getElementById('f_code').value||'').trim().toUpperCase();
    const rule=document.getElementById('f_rule').value.trim();
    if(!code||!rule){alert('الكود والقاعدة مطلوبان');return;}
    DB.noShowRules[code]=rule;
    refreshCounts();closeModal();showTab('noshow');
    await pushToGitHub();

  }else if(_modalMode==='add-saudi'){
    const code=(document.getElementById('f_code').value||'').trim().toUpperCase();
    if(!code){alert('أدخل الكود');return;}
    if(!DB.saudiAirports)DB.saudiAirports=[];
    if(DB.saudiAirports.includes(code)){alert('الكود موجود مسبقاً');return;}
    DB.saudiAirports.push(code);
    refreshCounts();closeModal();showTab('saudi');
    await pushToGitHub();
  }
}

// ══════════════════════════════════════════════
// DELETE → GitHub
// ══════════════════════════════════════════════
async function delAirport(code){if(!confirm(`حذف مطار ${code}؟`))return;delete DB.airports[code];refreshCounts();showTab('airports');await pushToGitHub();}
async function delAirline(code){if(!confirm(`حذف شركة ${code}؟`))return;delete DB.airlines[code];refreshCounts();showTab('airlines');await pushToGitHub();}
async function delNoShow(code){if(!confirm(`حذف قاعدة نو شو لـ ${code}؟`))return;delete DB.noShowRules[code];refreshCounts();showTab('noshow');await pushToGitHub();}
async function delSaudi(code){if(!confirm(`إزالة ${code}؟`))return;DB.saudiAirports=(DB.saudiAirports||[]).filter(c=>c!==code);refreshCounts();showTab('saudi');await pushToGitHub();}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
